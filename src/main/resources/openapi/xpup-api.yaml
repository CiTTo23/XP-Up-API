                $ref: '#/components/schemas/ApiError'
        "404":
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      operationId: deleteAdminComment
      tags:
        - AdminComments
      summary: Eliminar comentario como administrador
      description: Permite eliminar un comentario por motivos de moderación. Requiere rol ADMIN o SUPERADMIN.
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalCommentId'
      responses:
        "200":
          description: Comentario eliminado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "403":
          description: El usuario no tiene permisos de administración
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

# =========================
# COMPONENTS (DTOs)
# =========================

components:

  securitySchemes:

    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    InternalUserId:
      type: integer
      description: Identificador único de un usuario dentro del sistema.
      minimum: 1
      example: 123

    InternalPostId:
      type: integer
      description: Identificador único de una publicación dentro del sistema.
      minimum: 1
      example: 321

    InternalUserProfileResponse:
      type: object
      description: Información completa del perfil de un usuario incluyendo datos personales, progreso, skin activa y estadísticas sociales.
      properties:
        id:
          $ref: '#/components/schemas/InternalUserId'
        nombreUsuario:
          type: string
          description: Nombre visible del usuario en la plataforma.
          example: david_pro
        email:
          type: string
          description: Correo electrónico del usuario.
          format: email
          maxLength: 50
          example: david@gmail.com
        fotoPerfil:
          type: string
          description: URL de la imagen de perfil.
          maxLength: 255
          example: 'https://xpup.com/img/perfil1.jpg'
        biografia:
          type: string
          description: Descripción personal del usuario.
          maxLength: 255
          example: Jugador competitivo de shooters
        rol:
          type: string
          description: Rol del usuario dentro del sistema.
          example: USER
        fechaRegistro:
          type: string
          format: date-time
          description: Fecha de registro del usuario.
          example: 2026-04-05T12:00:00
        xpTotal:
          type: integer
          description: Experiencia total acumulada.
          minimum: 0
          example: 120
        nivel:
          type: integer
          description: Nivel actual del usuario.
          minimum: 1
          example: 3
        skinPerfil:
          $ref: '#/components/schemas/InternalProfileSkinResponse'
        totalSeguidores:
          type: integer
          description: Número total de seguidores del usuario.
          minimum: 0
          example: 10
        totalSeguidos:
          type: integer
          description: Número total de usuarios seguidos.
          minimum: 0
          example: 4
        totalPublicaciones:
          type: integer
          description: Número total de publicaciones del usuario.
          minimum: 0
          example: 7
      required:
        - id
        - nombreUsuario
        - email
        - rol
        - fechaRegistro
        - xpTotal
        - nivel
        - skinPerfil
        - totalSeguidores
        - totalSeguidos
        - totalPublicaciones

    InternalUserUpdateRequest:
      type: object
      description: Datos necesarios para actualizar el perfil de un usuario.
      properties:
        nombreUsuario:
          type: string
          description: Nuevo nombre del usuario.
          example: david_pro
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9._]+$"
        fotoPerfil:
          type: string
          description: Nueva URL de la imagen de perfil.
          maxLength: 255
          example: 'https://xpup.com/img/nueva-foto.jpg'
        biografia:
          type: string
          description: Nueva biografía del usuario.
          example: Jugador de Valorant y LoL
          maxLength: 255
      required:
        - nombreUsuario

    InternalPostRequest:
      type: object
      description: Datos necesarios para crear una nueva publicación.
      properties:
        idUsuario:
          $ref: '#/components/schemas/InternalUserId'
        titulo:
          type: string
          description: Título de la publicación.
          minLength: 1
          maxLength: 75
          example: Mi clutch en Valorant
        descripcion:
          type: string
          description: Descripción del contenido.
          maxLength: 2000
          example: Ace increíble
        tipoContenido:
          type: string
          enum: [VIDEO, IMAGEN]
          description: Tipo de contenido de la publicación.
          example: VIDEO
        idJuegoApi:
          type: string
          description: Identificador del videojuego en la API externa.
          minLength: 1
          maxLength: 50
          example: "12345"
        nombreJuego:
          type: string
          description: Nombre del juego asociado.
          minLength: 1
          maxLength: 50
          example: Valorant
        portadaJuegoUrl:
          type: string
          description: URL de la portada del juego.
          maxLength: 255
          example: 'https://xpup.com/games/valorant.jpg'
        archivoUrl:
          type: string
          description: URL del archivo multimedia principal.
          maxLength: 255
          example: 'https://xpup.com/media/post25.mp4'
        miniaturaUrl:
          type: string
          description: URL de la miniatura del contenido.
          maxLength: 255
          example: 'https://xpup.com/media/post25-thumb.jpg'
        hashtags:
          type: array
          maxItems: 10
          description: Lista de hashtags asociados a la publicación.
          items:
            type: string
            minLength: 2
            maxLength: 30
          example: ["#valorant", "#ace", "#clutch"]
      required:
        - idUsuario
        - titulo
        - tipoContenido
        - archivoUrl
        - nombreJuego
        - idJuegoApi

    InternalCommentRequest:
      type: object
      description: Datos necesarios para crear un comentario en una publicación.
      properties:
        idUsuario:
          $ref: '#/components/schemas/InternalUserId'
        idPublicacion:
          $ref: '#/components/schemas/InternalPostId'
        contenido:
          type: string
          description: Texto del comentario.
          minLength: 1
          maxLength: 1000
          example: Buenísima jugada
      required:
        - idUsuario
        - idPublicacion
        - contenido

    InternalLikeRequest:
      type: object
      description: Datos necesarios para dar o quitar like a una publicación.
      properties:
        idUsuario:
          $ref: '#/components/schemas/InternalUserId'
        idPublicacion:
          $ref: '#/components/schemas/InternalPostId'
      required:
        - idUsuario
        - idPublicacion

    InternalFollowRequest:
      type: object
      description: Datos necesarios para seguir o dejar de seguir a un usuario.
      properties:
        idSeguidor:
          $ref: '#/components/schemas/InternalUserId'
        idSeguido:
          $ref: '#/components/schemas/InternalUserId'
      required:
        - idSeguidor
        - idSeguido

    InternalLikeCheckResponse:
      type: object
      description: Resultado de la comprobación de si un usuario ha dado like a una publicación.
      properties:
        liked:
          type: boolean
          description: Indica si el usuario ha dado like a la publicación.
          example: true
      required:
        - liked


    InternalSavedCheckResponse:
      type: object
      description: Resultado de la comprobación de si un usuario ha guardado una publicación.
      properties:
        saved:
          type: boolean
          description: Indica si la publicación está guardada por el usuario.
          example: true
      required:
        - saved


    InternalFollowCheckResponse:
      type: object
      description: Resultado de la comprobación de si un usuario sigue a otro usuario.
      properties:
        following:
          type: boolean
          description: Indica si el usuario sigue al otro usuario.
          example: true
      required:
        - following


    InternalFollowStatsResponse:
      type: object
      description: Estadísticas de seguimiento de un usuario.
      properties:
        totalSeguidores:
          type: integer
          description: Número total de seguidores del usuario.
          minimum: 0
          example: 12
        totalSeguidos:
          type: integer
          description: Número total de usuarios a los que sigue.
          minimum: 0
          example: 5
      required:
        - totalSeguidores
        - totalSeguidos

    InternalPostSummaryResponse:
      type: object
      description: Información resumida de una publicación para listados como feed o guardados.
      properties:
        id:
          $ref: '#/components/schemas/InternalPostId'
        usuario:
          $ref: '#/components/schemas/InternalUserSummaryResponse'
        titulo:
          type: string
          description: Título de la publicación.
          example: Mi clutch en Valorant
        descripcion:
          type: string
          description: Descripción breve del contenido.
          example: Ace increíble
        tipoContenido:
          type: string
          description: Tipo de contenido de la publicación.
          example: VIDEO
        archivoUrl:
          type: string
          description: URL del contenido multimedia.
          maxLength: 255
          example: https://xpup.com/media/post25.mp4
        miniaturaUrl:
          type: string
          description: URL de la miniatura del contenido.
          maxLength: 255
          example: https://xpup.com/media/post25-thumb.jpg
        idJuegoApi:
          type: string
          description: Identificador del videojuego en la API externa.
          example: "12345"
        nombreJuego:
          type: string
          description: Nombre del juego asociado a la publicación.
          example: Valorant
        portadaJuegoUrl:
          type: string
          description: URL de la portada del juego.
          maxLength: 255
          example: https://xpup.com/games/valorant.jpg
        fechaPublicacion:
          type: string
          format: date-time
          description: Fecha de publicación.
          example: 2026-04-05T12:00:00
        totalLikes:
          type: integer
          description: Número total de likes.
          minimum: 0
          example: 18
        totalComentarios:
          type: integer
          description: Número total de comentarios.
          minimum: 0
          example: 5
        likedByUser:
          type: boolean
          description: Indica si el usuario ha dado like.
          example: true
        savedByUser:
          type: boolean
          description: Indica si el usuario ha guardado la publicación.
          example: true
      required:
        - id
        - usuario
        - titulo
        - tipoContenido
        - archivoUrl
        - fechaPublicacion
        - totalLikes
        - totalComentarios
        - likedByUser
        - savedByUser


    InternalUserSummaryResponse:
      type: object
      description: Información básica de un usuario utilizada en listados.
      properties:
        id:
          $ref: '#/components/schemas/InternalUserId'
        nombreUsuario:
          type: string
          description: Nombre del usuario.
          example: david_pro
        fotoPerfil:
          type: string
          description: URL de la imagen de perfil.
          maxLength: 255
          example: https://xpup.com/img/perfil1.jpg
        nivel:
          type: integer
          description: Nivel del usuario.
          minimum: 1
          example: 3
      required:
        - id
        - nombreUsuario
        - nivel

    AuthRegisterRequest:
      type: object
      description: Datos necesarios para registrar un nuevo usuario en XP-Up.
      properties:
        nombreUsuario:
          type: string
          pattern: "^[a-zA-Z0-9._]+$"
          minLength: 3
          maxLength: 20
          example: david_pro
        email:
          type: string
          format: email
          maxLength: 50
          example: david@gmail.com
        password:
          type: string
          format: password
          maxLength: 100
          minLength: 8
          pattern: "^(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}$"
          example: Password@123
      required:
        - nombreUsuario
        - email
        - password

    AuthRegisterResponse:
      type: object
      description: Respuesta devuelta tras registrar un usuario correctamente.
      properties:
        id:
          type: integer
          example: 1
        nombreUsuario:
          type: string
          example: david_pro
        email:
          type: string
          format: email
          maxLength: 50
          example: david@gmail.com
        rol:
          type: string
          example: USER
        fechaRegistro:
          type: string
          format: date-time
          example: 2026-04-12T10:30:00
        mensaje:
          type: string
          example: Usuario registrado correctamente
      required:
        - id
        - nombreUsuario
        - email
        - rol
        - fechaRegistro
        - mensaje

    AuthLoginRequest:
      type: object
      description: Credenciales necesarias para iniciar sesión.
      properties:
        identificador:
          type: string
          description: Email o nombre de usuario.
          minLength: 3
          maxLength: 50
          example: david_pro
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 100
          example: Password@123
      required:
        - identificador
        - password

    AuthLoginResponse:
      type: object
      description: Respuesta devuelta tras autenticación correcta.
      properties:
        token:
          type: string
          description: JWT del usuario autenticado.
          example: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJkYXZpZF9wcm8ifQ.signature
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/AuthUserResponse'
      required:
        - token
        - tokenType
        - user

    AuthUserResponse:
      type: object
      description: Información básica del usuario autenticado.
      properties:
        id:
          type: integer
          example: 1
        nombreUsuario:
          type: string
          example: david_pro
        email:
          type: string
          format: email
          maxLength: 50
          example: david@gmail.com
        rol:
          type: string
          example: USER
      required:
        - id
        - nombreUsuario
        - email
        - rol

    MessageResponse:
      type: object
      description: Respuesta simple de éxito.
      properties:
        mensaje:
          type: string
          example: Sesión cerrada correctamente
      required:
        - mensaje

    ApiError:
      type: object
      description: Respuesta genérica de error de la API.
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2026-04-12T10:35:00
        status:
          type: integer
          example: 401
        error:
          type: string
          example: Unauthorized
        message:
          type: string
          example: Credenciales incorrectas
        path:
          type: string
          example: /api/auth/login
      required:
        - timestamp
        - status
        - error
        - message
        - path

    InternalPostCreateResponse:
      type: object
      description: Respuesta devuelta tras crear una publicación correctamente.
      properties:
        id:
          $ref: '#/components/schemas/InternalPostId'
        mensaje:
          type: string
          example: Publicación creada correctamente
      required:
        - id
        - mensaje

    InternalPostDetailResponse:
      type: object
      description: Información completa de una publicación concreta.
      properties:
        id:
          $ref: '#/components/schemas/InternalPostId'
        usuario:
          $ref: '#/components/schemas/InternalUserSummaryResponse'
        titulo:
          type: string
          example: Mi clutch en Valorant
        descripcion:
          type: string
          example: Ace increíble
        tipoContenido:
          type: string
          example: VIDEO
        archivoUrl:
          type: string
          maxLength: 255
          example: https://xpup.com/media/post25.mp4
        miniaturaUrl:
          type: string
          maxLength: 255
          example: https://xpup.com/media/post25-thumb.jpg
        idJuegoApi:
          type: string
          description: Identificador del videojuego en la API externa.
          example: "12345"
        nombreJuego:
          type: string
          example: Valorant
        portadaJuegoUrl:
          type: string
          maxLength: 255
          example: https://xpup.com/games/valorant.jpg
        fechaPublicacion:
          type: string
          format: date-time
          example: 2026-04-05T12:00:00
        totalLikes:
          type: integer
          minimum: 0
          example: 18
        totalComentarios:
          type: integer
          minimum: 0
          example: 5
        likedByUser:
          type: boolean
          example: true
        savedByUser:
          type: boolean
          example: false
      required:
        - id
        - usuario
        - titulo
        - tipoContenido
        - archivoUrl
        - fechaPublicacion
        - totalLikes
        - totalComentarios
        - likedByUser
        - savedByUser


    InternalPostUpdateRequest:
      type: object
      description: Datos necesarios para actualizar una publicación existente.
      properties:
        idUsuario:
          $ref: '#/components/schemas/InternalUserId'
        titulo:
          type: string
          description: Nuevo título de la publicación.
          minLength: 1
          maxLength: 75
          example: Mi clutch editado en Valorant
        descripcion:
          type: string
          description: Nueva descripción del contenido.
          maxLength: 2000
          example: Ace increíble editado
        nombreJuego:
          type: string
          description: Nuevo nombre del juego asociado.
          minLength: 1
          maxLength: 50
          example: Valorant
        idJuegoApi:
          type: string
          description: Nuevo identificador del videojuego en la API externa.
          minLength: 1
          maxLength: 50
          example: "12345"
        portadaJuegoUrl:
          type: string
          description: Nueva URL de la portada del juego.
          maxLength: 255
          example: 'https://xpup.com/games/valorant.jpg'
        archivoUrl:
          type: string
          description: Nueva URL del archivo multimedia principal.
          maxLength: 255
          example: 'https://xpup.com/media/post25.mp4'
        miniaturaUrl:
          type: string
          description: Nueva URL de la miniatura del contenido.
          maxLength: 255
          example: 'https://xpup.com/media/post25-thumb.jpg'
        hashtags:
          type: array
          maxItems: 10
          description: Nueva lista de hashtags asociados a la publicación.
          items:
            type: string
            minLength: 2
            maxLength: 30
          example: [ "#valorant", "#clutch", "#editado" ]
      required:
        - idUsuario
        - titulo
        - nombreJuego
        - idJuegoApi

    InternalPostListResponse:
      type: array
      description: Lista de publicaciones.
      items:
        $ref: '#/components/schemas/InternalPostSummaryResponse'

    InternalPagedPostResponse:
      type: object
      description: Resultado paginado de publicaciones.
      properties:
        content:
          type: array
          description: Lista de publicaciones de la página actual.
          items:
            $ref: '#/components/schemas/InternalPostSummaryResponse'
        page:
          type: integer
          description: Número de página actual.
          minimum: 0
          example: 0
        size:
          type: integer
          description: Número de elementos por página.
          minimum: 1
          maximum: 50
          example: 10
        totalElements:
          type: integer
          description: Número total de publicaciones encontradas.
          minimum: 0
          example: 57
        totalPages:
          type: integer
          description: Número total de páginas.
          minimum: 0
          example: 6
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages

    InternalLikesCountResponse:
      type: object
      description: Número total de likes de una publicación.
      properties:
        postId:
          $ref: '#/components/schemas/InternalPostId'
        totalLikes:
          type: integer
          minimum: 0
          example: 18
      required:
        - postId
        - totalLikes

    InternalExperienceResponse:
      type: object
      description: Información de experiencia y nivel de un usuario.
      properties:
        userId:
          $ref: '#/components/schemas/InternalUserId'
        xpTotal:
          type: integer
          minimum: 0
          example: 150
        nivel:
          type: integer
          minimum: 1
          example: 4
      required:
        - userId
        - xpTotal
        - nivel

    InternalCommentResponse:
      type: object
      description: Información de un comentario publicado en una publicación.
      properties:
        id:
          type: integer
          example: 101
        usuario:
          $ref: '#/components/schemas/InternalUserSummaryResponse'
        contenido:
          type: string
          description: Texto del comentario.
          maxLength: 1000
          example: Buenísima jugada
        fechaComentario:
          type: string
          format: date-time
          description: Fecha de creación del comentario.
          example: 2026-04-12T11:30:00
      required:
        - id
        - usuario
        - contenido
        - fechaComentario

    InternalCommentListResponse:
      type: array
      description: Lista de comentarios de una publicación.
      items:
        $ref: '#/components/schemas/InternalCommentResponse'

    InternalUserListResponse:
      type: array
      description: Lista de usuarios.
      items:
        $ref: '#/components/schemas/InternalUserSummaryResponse'

    ExternalGameResponse:
      type: object
      description: Información básica de un videojuego obtenida desde la API externa.
      properties:
        idJuegoApi:
          type: string
          description: Identificador único del videojuego en la API externa.
          minLength: 1
          maxLength: 50
          example: "12345"
        nombreJuego:
          type: string
          description: Nombre del videojuego.
          minLength: 1
          maxLength: 100
          example: Valorant
        portadaJuegoUrl:
          type: string
          description: URL de la portada del videojuego.
          maxLength: 255
          example: https://images.igdb.com/valorant.jpg
        fechaLanzamiento:
          type: string
          format: date
          description: Fecha de lanzamiento del videojuego.
          example: 2020-06-02
      required:
        - idJuegoApi
        - nombreJuego

    ExternalGameListResponse:
      type: array
      description: Lista de videojuegos obtenidos desde la API externa.
      items:
        $ref: '#/components/schemas/ExternalGameResponse'

    InternalProfileSkinId:
      type: integer
      description: Identificador único de una skin de perfil.
      minimum: 1
      example: 2

    InternalProfileSkinResponse:
      type: object
      description: Información de la skin activa de perfil de un usuario.
      properties:
        id:
          $ref: '#/components/schemas/InternalProfileSkinId'
        codigo:
          type: string
          description: Código único de la skin.
          maxLength: 30
          example: BRONZE
        nombre:
          type: string
          description: Nombre visible de la skin.
          maxLength: 50
          example: Bronce
        descripcion:
          type: string
          description: Descripción de la skin.
          maxLength: 255
          example: Tema desbloqueable con detalles metálicos en bronce.
        nivelRequerido:
          type: integer
          description: Nivel mínimo necesario para desbloquear la skin.
          minimum: 1
          example: 5
        fondoUrlOscuro:
          type: string
          nullable: true
          description: URL del fondo usado en modo oscuro.
          maxLength: 255
          example: https://res.cloudinary.com/dq1e79vct/image/upload/v1778524660/ChatGPT_Image_11_may_2026_20_37_29_zymuwj.png
        fondoUrlClaro:
          type: string
          nullable: true
          description: URL del fondo usado en modo claro.
          maxLength: 255
          example: https://res.cloudinary.com/dq1e79vct/image/upload/v1778524720/ChatGPT_Image_11_may_2026_20_38_29_ylaspw.png
        activa:
          type: boolean
          description: Indica si la skin está activa en el catálogo del sistema.
          example: true
      required:
        - id
        - codigo
        - nombre
        - nivelRequerido
        - activa

    InternalUserProfileSkinResponse:
      type: object
      description: Información de una skin de perfil junto con su estado para un usuario concreto.
      properties:
        id:
          $ref: '#/components/schemas/InternalProfileSkinId'
        codigo:
          type: string
          description: Código único de la skin.
          maxLength: 30
          example: BRONZE
        nombre:
          type: string
          description: Nombre visible de la skin.
          maxLength: 50
          example: Bronce
        descripcion:
          type: string
          description: Descripción de la skin.
          maxLength: 255
