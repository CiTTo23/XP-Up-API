openapi: 3.0.0
info:
  title: XP-Up API
  version: 1.0.0
  description: API REST para la plataforma XP-Up
  contact:
    name: David Martinez Lopez
    email: dmljm2013@gmail.com

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Endpoints destinados al registro, autenticación y cierre de sesión de usuarios.
  - name: Usuarios
    description: Endpoints destinados a la gestión del usuario del sistema XP-Up. Abarca la obtención  actualización de datos de los mismos.
  - name: Publicaciones
    description: Endpoints destinados a la creación, obtención, edición y eliminación de publicaciones en el sistema XP-Up.
  - name: Feed
    description: Endpoints destinados a la obtención del feed de publicaciones que se mostrará a los usuarios en el sistema XP-Up.
  - name: Comentarios
    description: Endpoints destinados a la subida y obtención de los comentarios de cada una de las publicaciones en el sistema XP-Up.
  - name: Likes
    description: Endpoints destinados a la subida y obtención de los likes de cada una de las publicaciones en el sistema XP-Up.
  - name: Guardados
    description: Endpoints destinados a la marcación y desmarcación de las publicaciones como "guardadas" del usuario en el sistema XP-Up.
  - name: Seguimientos
    description: Endpoints destinados a la gestión de los seguimientos entre usuarios en el sistema XP-Up.
  - name: Experiencia
    description: Endpoints destinados a la gestión de la experiencia y nivel de los usuarios en el sistema XP-Up.
  - name: Videojuegos
    description: Endpoints destinados a la búsqueda y consulta de videojuegos desde una API externa.
  - name: Skins
    description: Endpoints destinados a la consulta y selección de skins desbloqueables para el perfil de usuario.
  - name: AdminGeneral
    description: Endpoints generales del panel de administración de XP-Up. Permiten consultar estadísticas globales y el histórico de operaciones administrativas.
  - name: AdminUsers
    description: Endpoints destinados a la consulta y gestión administrativa de usuarios dentro del panel de administración de XP-Up.
  - name: AdminPosts
    description: Endpoints destinados a la consulta, edición y moderación de publicaciones desde el panel de administración de XP-Up.
  - name: AdminComments
    description: Endpoints destinados a la consulta, edición y moderación de comentarios desde el panel de administración de XP-Up.
  - name: Superadmin
    description: Endpoints exclusivos para usuarios con rol SUPERADMIN. Permiten realizar operaciones críticas como modificar usuarios, eliminar usuarios y gestionar roles.

paths:
  # =========================
  # AUTH
  # =========================

  /api/auth/register:
    post:
      operationId: registerUser
      tags:
        - Auth
      summary: Registrar nuevo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        "201":
          description: Usuario registrado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRegisterResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "409":
          description: El nombre de usuario o el email ya están en uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/auth/login:
    post:
      operationId: loginUser
      tags:
        - Auth
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        "200":
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/auth/logout:
    post:
      operationId: logoutUser
      tags:
        - Auth
      summary: Cerrar sesión
      responses:
        "200":
          description: Sesión cerrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # =========================
  # USERS
  # =========================

  /api/users/{userId}:
    get:
      operationId: getUserProfile
      tags:
        - Usuarios
      summary: Obtener perfil de usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
      responses:
        "200":
          description: Perfil de usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUserProfileResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    put:
      operationId: updateUserProfile
      tags:
        - Usuarios
      summary: Editar perfil
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalUserUpdateRequest'
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUserProfileResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "409":
          description: Nombre de usuario ya en uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/users/{userId}/posts:
    get:
      operationId: getUserPosts
      tags:
        - Usuarios
      summary: Obtener publicaciones de un usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
      responses:
        "200":
          description: Lista de publicaciones del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalPostListResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/users/{userId}/likes:
    get:
      operationId: getUserLikedPosts
      tags:
        - Usuarios
      summary: Obtener publicaciones con like de un usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
      responses:
        "200":
          description: Lista de publicaciones con like del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalPostListResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/users/{userId}/saved:
    get:
      operationId: getUserSavedPosts
      tags:
        - Usuarios
      summary: Obtener publicaciones guardadas de un usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
      responses:
        "200":
          description: Lista de publicaciones guardadas del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalPostListResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/users/{userId}/following:
    get:
      operationId: getUserFollowing
      tags:
        - Usuarios
      summary: Obtener usuarios seguidos por un usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
      responses:
        "200":
          description: Lista de usuarios seguidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUserListResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/users/{userId}/followers:
    get:
      operationId: getUserFollowers
      tags:
        - Usuarios
      summary: Obtener seguidores de un usuario
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
      responses:
        "200":
          description: Lista de seguidores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUserListResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # =========================
  # POSTS
  # =========================

  /api/posts:
    post:
      operationId: createPost
      tags:
        - Publicaciones
      summary: Crear publicación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalPostRequest'
      responses:
        "201":
          description: Publicación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalPostCreateResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/posts/{postId}:
    get:
      operationId: getPostById
      tags:
        - Publicaciones
      summary: Obtener detalle de publicación
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalPostId'
      responses:
        "200":
          description: Detalle de publicación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalPostDetailResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Publicacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    put:
      operationId: updatePost
      tags:
        - Publicaciones
      summary: Editar publicación
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalPostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalPostUpdateRequest'
      responses:
        "200":
          description: Publicación actualizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalPostDetailResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "403":
          description: El usuario no tiene permisos para editar esta publicación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Publicacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      operationId: deletePost
      tags:
        - Publicaciones
      summary: Eliminar publicación
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalPostId'
      responses:
        "200":
          description: Publicación eliminada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Publicacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # =========================
  # FEED
  # =========================

  /api/feed:
    get:
      operationId: getFeed
      tags:
        - Feed
      summary: Obtener feed general
      parameters:
        - name: orden
          in: query
          required: false
          description: Criterio de ordenación del feed.
          schema:
            type: string
            enum: [fecha, popularidad]
            example: fecha
        - name: page
          in: query
          required: false
          description: Número de página.
          schema:
            type: integer
            minimum: 0
            example: 0
        - name: size
          in: query
          required: false
          description: Número de elementos por página.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            example: 10
        - name: nombreJuego
          in: query
          required: false
          description: Filtrar publicaciones por nombre del videojuego asociado.
          schema:
            type: string
            minLength: 2
            example: Valorant
      responses:
        "200":
          description: Lista paginada de publicaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalPagedPostResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/feed/following/{userId}:
    get:
      operationId: getFollowingFeed
      tags:
        - Feed
      summary: Feed de seguidos
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
        - name: orden
          in: query
          required: false
          description: Criterio de ordenación del feed de seguidos.
          schema:
            type: string
            enum: [fecha, popularidad]
            example: fecha
        - name: page
          in: query
          required: false
          description: Número de página.
          schema:
            type: integer
            minimum: 0
            example: 0
        - name: size
          in: query
          required: false
          description: Número de elementos por página.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            example: 10
      responses:
        "200":
          description: Lista paginada de publicaciones de usuarios seguidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalPagedPostResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'


  # =========================
  # COMMENTS
  # =========================

  /api/comments:
    post:
      operationId: createComment
      tags:
        - Comentarios
      summary: Crear comentario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalCommentRequest'
      responses:
        "201":
          description: Comentario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalCommentResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/comments/post/{postId}:
    get:
      operationId: getCommentsByPost
      tags:
        - Comentarios
      summary: Obtener comentarios de una publicación
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalPostId'
      responses:
        "200":
          description: Lista de comentarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalCommentListResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Publicacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # =========================
  # LIKES
  # =========================

  /api/likes:
    post:
      operationId: likePost
      tags:
        - Likes
      summary: Dar like
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalLikeRequest'
      responses:
        "200":
          description: Like añadido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "409":
          description: Like ya existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      operationId: unlikePost
      tags:
        - Likes
      summary: Quitar like
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalLikeRequest'
      responses:
        "200":
          description: Like eliminado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/likes/post/{postId}:
    get:
      operationId: getPostLikesCount
      tags:
        - Likes
      summary: Obtener número de likes
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/InternalPostId'
      responses:
        "200":
          description: Total de likes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalLikesCountResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "404":
          description: Publicacion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/likes/check:
    get:
      operationId: checkUserLike
      tags:
        - Likes
      summary: Comprobar si un usuario ha dado like a una publicación
      parameters:
        - name: idUsuario
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
        - name: idPublicacion
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/InternalPostId'
      responses:
        "200":
          description: Resultado de la comprobación de like
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalLikeCheckResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # =========================
  # SAVED
  # =========================

  /api/saved:
    post:
      operationId: savePost
      tags:
        - Guardados
      summary: Guardar publicación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalLikeRequest'
      responses:
        "200":
          description: Guardado añadido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "409":
          description: Guardado ya existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      operationId: unsavePost
      tags:
        - Guardados
      summary: Quitar guardado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalLikeRequest'
      responses:
        "200":
          description: Guardado eliminado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/saved/check:
    get:
      operationId: checkUserSavedPost
      tags:
        - Guardados
      summary: Comprobar si un usuario ha guardado una publicación
      parameters:
        - name: idUsuario
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/InternalUserId'
        - name: idPublicacion
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/InternalPostId'
      responses:
        "200":
          description: Resultado de la comprobación de guardado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalSavedCheckResponse'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'


  # =========================
  # FOLLOWS
  # =========================

  /api/follows:
    post:
      operationId: followUser
      tags:
        - Seguimientos
      summary: Seguir usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalFollowRequest'
      responses:
        "200":
          description: Usuario seguido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "400":
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "401":
          description: Token no válido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        "409":
          description: Seguimiento ya existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

